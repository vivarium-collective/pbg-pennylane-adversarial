name: Publish read-only dashboard

# Build the workspace into a self-contained static SPA snapshot and publish it
# to the gh-pages branch at dashboard/ (served at
# <user>.github.io/<repo>/dashboard/). The READ-ONLY mirror of every
# investigation + study on main — browsable with no server.
#
# Ships with every workspace scaffolded from the template. Repo-specific bits
# (base path, interactive link) are derived from the GitHub repo at run time, so
# there is nothing to edit per workspace.
#
# One-time setup: Settings → Pages → Source = "Deploy from a branch" → gh-pages
# (this workflow creates the gh-pages branch on its first run).
#
# DEPLOY job (post-merge to main), NOT a PR gate — a failure here never blocks a
# merge. It only ever writes dashboard/ on gh-pages.

on:
  push:
    branches: [main]
    paths:
      - 'workspace/**'
      - 'scripts/publish_dashboard.sh'
      - '.github/workflows/publish-dashboard.yml'
  workflow_dispatch:

concurrency:
  group: publish-dashboard
  cancel-in-progress: true

permissions:
  contents: write   # push to the gh-pages branch

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12.9

      - name: Install dependencies (incl. vivarium-dashboard)
        run: uv sync --extra dev || uv sync

      - name: Ensure the publish CLI is present (latest dashboard main)
        # uv.lock may pin a vivarium-dashboard commit predating the publish CLI;
        # force current main so `vivarium-dashboard-publish` exists.
        run: uv pip install --reinstall-package vivarium-dashboard "vivarium-dashboard @ git+https://github.com/vivarium-collective/vivarium-dashboard.git@main"

      - name: Build dashboard snapshot
        # Run inside the activated venv, NOT `uv run` — `uv run` re-syncs to
        # uv.lock first, which would undo the ad-hoc vivarium-dashboard@main
        # install above and drop the publish console script (-> exit 127).
        # base-path / interactive-url are derived from the GitHub repo.
        run: |
          source .venv/bin/activate
          bash scripts/publish_dashboard.sh \
            reports/published/dashboard \
            "/${{ github.event.repository.name }}/dashboard" \
            "${{ github.server_url }}/${{ github.repository }}"

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          if [ ! -f reports/published/dashboard/index.html ]; then
            echo "::error::build produced no bundle (no index.html); nothing to publish"
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Worktree on gh-pages, bootstrapping the branch on first publish.
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add /tmp/ghp gh-pages
          else
            echo "gh-pages does not exist yet — bootstrapping it"
            git worktree add --detach /tmp/ghp
            ( cd /tmp/ghp && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true )
          fi
          rm -rf /tmp/ghp/dashboard
          mkdir -p /tmp/ghp/dashboard
          cp -R reports/published/dashboard/. /tmp/ghp/dashboard/
          touch /tmp/ghp/.nojekyll
          cd /tmp/ghp
          git add -A
          if git diff --cached --quiet; then
            echo "dashboard snapshot unchanged; skipping commit"
          else
            git commit -m "gh-pages: republish read-only dashboard (automated, ${GITHUB_SHA::7})"
            git push origin gh-pages
            echo "published read-only dashboard to gh-pages:dashboard/"
          fi

      - name: Feature the live dashboard in README
        # Keep a prominent dashboard banner in README.md (on main) pointing at
        # the hosted site. Derives the URL from the repo, commits only on a diff
        # (so effectively a one-time edit), and never blocks — README isn't in
        # this workflow's trigger paths, so the commit won't re-trigger it.
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"; repo="${{ github.event.repository.name }}"
          python3 scripts/feature_dashboard_in_readme.py README.md \
            "https://${owner}.github.io/${repo}/dashboard/" \
            "https://${owner}.github.io/${repo}/"
          if ! git diff --quiet README.md; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: feature the live dashboard in README (automated)"
            git push origin HEAD:main \
              || echo "README push skipped (non-fast-forward); refreshes next run"
          fi
